<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — CAFI Student Portal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f4f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #111;
        }

        p.subtitle {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.375rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.625rem 2.5rem 0.625rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            color: #111;
            outline: none;
            transition: border-color 0.15s;
        }

        .input-wrapper input:focus {
            border-color: #2563eb;
        }

        .toggle-btn {
            position: absolute;
            right: 0.625rem;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            padding: 0;
            background: none;
            border: none;
            border-radius: 0;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s;
        }

        .toggle-btn:hover {
            background: none;
            color: #6b7280;
        }

        .toggle-btn:disabled {
            background: none;
            cursor: not-allowed;
        }

        .toggle-btn svg {
            width: 1.125rem;
            height: 1.125rem;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.675rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        button[type="submit"]:hover { background: #1d4ed8; }
        button[type="submit"]:disabled { background: #93c5fd; cursor: not-allowed; }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 0;
            }

            .card {
                min-height: 100vh;
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                padding: 2rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset your password</h1>
        <p class="subtitle">Enter a new password for your CAFI Student Portal account.</p>

        <form id="resetForm">
            <label for="password">New password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
                <button type="button" class="toggle-btn" aria-label="Toggle password visibility" data-target="password">
                    <!-- eye-off by default -->
                </button>
            </div>

            <label for="confirm">Confirm new password</label>
            <div class="input-wrapper">
                <input type="password" id="confirm" placeholder="Repeat your new password" required minlength="6" />
                <button type="button" class="toggle-btn" aria-label="Toggle password visibility" data-target="confirm">
                    <!-- eye-off by default -->
                </button>
            </div>

            <button type="submit" id="submitBtn">Reset password</button>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        const SVG_EYE = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>`;

        const SVG_EYE_OFF = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>`;

        // Initialise toggle buttons
        document.querySelectorAll('.toggle-btn').forEach((btn) => {
            btn.innerHTML = SVG_EYE_OFF;

            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                btn.innerHTML = isHidden ? SVG_EYE : SVG_EYE_OFF;
            });
        });

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }

        if (!token) {
            form.style.display = 'none';
            showMessage('Invalid or missing reset link. Please request a new one.', 'error');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });

                const data = await res.json();

                if (res.ok) {
                    form.style.display = 'none';
                    showMessage('Password reset successfully. You can now log in with your new password.', 'success');
                } else {
                    showMessage(data.message || 'Something went wrong. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset password';
                }
            } catch (err) {
                showMessage('Unable to connect. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset password';
            }
        });
    </script>
</body>
</html>
